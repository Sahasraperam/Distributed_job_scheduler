version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: codity-scheduler-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: codity_jobs
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d codity_jobs"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: ./apps/api/Dockerfile
    container_name: codity-scheduler-api
    ports:
      - '5001:5001'
    environment:
      DATABASE_URL: postgresql://postgres:postgrespassword@postgres:5432/codity_jobs?schema=public
      JWT_SECRET: production-secret-key-998877
      PORT: 5001
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: ./apps/worker/Dockerfile
    container_name: codity-scheduler-worker
    environment:
      DATABASE_URL: postgresql://postgres:postgrespassword@postgres:5432/codity_jobs?schema=public
      WORKER_CONCURRENCY: 5
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy

  dashboard:
    build:
      context: .
      dockerfile: ./apps/dashboard/Dockerfile
    container_name: codity-scheduler-dashboard
    ports:
      - '3000:3000'
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5001/api
      NODE_ENV: production
    depends_on:
      - api

volumes:
  pgdata:
