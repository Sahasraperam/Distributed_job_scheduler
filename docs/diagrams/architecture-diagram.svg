<text x="569.3333333333334" y="542" text-anchor="middle" font-size="10" font-weight="700" fill="#B91C1C">every 2s</text>
<text x="569.3333333333334" y="560" text-anchor="middle" font-size="9" fill="#4B5563">SCHEDULED &#8594; QUEUED when</text>
<text x="569.3333333333334" y="572" text-anchor="middle" font-size="9" fill="#4B5563">nextRunAt &#8804; now; resolves cron/batch spawns</text>
<rect x="712.6666666666666" y="508" width="254.66666666666666" height="68" rx="8" fill="white" stroke="#FCA5A5" stroke-width="1.6"/>
<text x="840.0" y="526" text-anchor="middle" font-size="11" font-weight="700" fill="#991B1B" font-family="'JetBrains Mono', 'SF Mono', Consolas, monospace">processCronTriggers()</text>
<text x="840.0" y="542" text-anchor="middle" font-size="10" font-weight="700" fill="#B91C1C">every 5s</text>
<text x="840.0" y="560" text-anchor="middle" font-size="9" fill="#4B5563">evaluates</text>
<text x="840.0" y="572" text-anchor="middle" font-size="9" fill="#4B5563">ScheduledJob.cronExpression, enqueues due recurring jobs</text>
<rect x="983.3333333333333" y="508" width="254.66666666666666" height="68" rx="8" fill="white" stroke="#FCA5A5" stroke-width="1.6"/>
<text x="1110.6666666666665" y="526" text-anchor="middle" font-size="11" font-weight="700" fill="#991B1B" font-family="'JetBrains Mono', 'SF Mono', Consolas, monospace">recoverAbandonedJobs()</text>
<text x="1110.6666666666665" y="542" text-anchor="middle" font-size="10" font-weight="700" fill="#B91C1C">every 10s</text>
<text x="1110.6666666666665" y="560" text-anchor="middle" font-size="9" fill="#4B5563">workers silent &gt;30s</text>
<text x="1110.6666666666665" y="572" text-anchor="middle" font-size="9" fill="#4B5563">&#8594; OFFLINE; in-flight jobs requeued or sent to DLQ</text>
